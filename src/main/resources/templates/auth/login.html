<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Badminton Club Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .error-banner { background-color: #fde8e8; color: #e02424; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 10px; background-color: #1a56db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .submit-btn:hover { background-color: #1e429f; }
        .signup-prompt { margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-signup { color: #1a56db; text-decoration: none; font-weight: bold; }
        .lang-switcher { text-align: center; margin-top: 20px; font-size: 13px; color: #9ca3af; }
        .lang-switcher a { color: #4b5563; text-decoration: none; font-weight: bold; padding: 0 5px; }
        .lang-switcher a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 th:text="#{login.heading}">Badminton Club Login</h2>

    <div class="error-banner" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <form th:action="@{/auth/login}" method="POST">
        <div class="form-group">
            <label for="email" th:text="#{login.email}">Email Address</label>
            <input type="email" id="email" name="email" required th:placeholder="#{login.email.placeholder}">
        </div>
        <div class="form-group">
            <label for="password" th:text="#{login.password}">Password</label>
            <input type="password" id="password" name="password" required th:placeholder="#{login.password.placeholder}">
        </div>
        <button type="submit" class="submit-btn" th:text="#{login.submit}">Sign In</button>
    </form>

    <div class="signup-prompt">
        <p>
            <span th:text="#{login.prompt}">Don't have an account?</span>
            <a th:href="@{/auth/signup}" class="btn-signup" th:text="#{login.link.signup}">Sign Up Now</a>
        </p>
    </div>

    <div class="lang-switcher">
        <a href="?lang=en">EN</a> | <a href="?lang=ru">RU</a>
    </div>
</div>

</body>
</html>
